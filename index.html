<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrast | Secure Velocity</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --danger: #ff4b2b;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- Security Badge --- */
        #auth-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--danger);
            color: var(--danger);
            background: rgba(255, 75, 43, 0.1);
            transition: 0.5s all ease;
            z-index: 100;
        }

        #auth-status.verified {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- Background & Animations --- */
        .blob {
            position: fixed;
            width: 400px; height: 400px;
            background: var(--secondary);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            background: linear-gradient(90deg, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .btn {
            margin-top: 2rem;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }
    </style>
</head>
<body>

    <div id="auth-status">System Status: Scanning...</div>
    <div class="blob"></div>

    <div style="text-align: center;">
        <h1>FASTTRAST</h1>
        <p style="letter-spacing: 5px; opacity: 0.6;">INTELLIGENT VERIFICATION</p>
        <button class="btn" onclick="checkAccess()">INITIALIZE</button>
    </div>

    <script>
        let isHuman = false;
        const statusBadge = document.getElementById('auth-status');

        // Detection Logic
        function verifyHuman() {
            if (!isHuman) {
                isHuman = true;
                statusBadge.innerText = "Status: Human Verified";
                statusBadge.classList.add('verified');
                console.log("Behavioral analysis complete: Human detected.");
            }
        }

        // Listen for mouse move (Desktop) or touch (Mobile)
        window.addEventListener('mousemove', verifyHuman, { once: true });
        window.addEventListener('touchstart', verifyHuman, { once: true });
        window.addEventListener('scroll', verifyHuman, { once: true });

        function checkAccess() {
            if (!isHuman) {
                alert("ACCESS DENIED: Automated behavior detected.");
                statusBadge.style.transform = "scale(1.2)";
                setTimeout(() => statusBadge.style.transform = "scale(1)", 200);
            } else {
                alert("ACCESS GRANTED: Welcome, User.");
                // Proceed with your polished animations...
            }
        }
    </script>
</body>
</html>
