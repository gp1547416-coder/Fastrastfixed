<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrast | Secure Velocity</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --danger: #ff4b2b;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #auth-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--danger);
            color: var(--danger);
            background: rgba(255, 75, 43, 0.1);
            transition: 0.5s all ease;
            z-index: 100;
        }

        #auth-status.verified {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px var(--primary);
        }

        .blob {
            position: fixed;
            width: 500px; height: 500px;
            background: var(--secondary);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: move 15s infinite alternate;
        }

        .container { text-align: center; transition: 0.8s ease; }
        .fade-out { opacity: 0; transform: translateY(-20px); }

        h1 {
            font-size: clamp(3rem, 12vw, 6rem);
            background: linear-gradient(90deg, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .btn {
            margin-top: 2rem;
            padding: 18px 50px;
            background: transparent;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn:hover { background: var(--primary); color: black; box-shadow: 0 0 30px var(--primary); }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes move { from { transform: translate(-30%, -30%); } to { transform: translate(30%, 30%); } }
    </style>
</head>
<body>

    <div id="auth-status">System: Scanning...</div>
    <div class="blob"></div>

    <div class="container" id="main-content">
        <h1>FASTTRAST</h1>
        <p style="letter-spacing: 8px; opacity: 0.5; margin-bottom: 20px;">BEHAVIORAL OVERRIDE ACTIVE</p>
        <button class="btn" onclick="checkAccess()">INITIALIZE</button>
    </div>

    <script>
        let isHuman = false;
        const statusBadge = document.getElementById('auth-status');

        function verifyHuman() {
            if (!isHuman) {
                isHuman = true;
                statusBadge.innerText = "Status: Human Verified";
                statusBadge.classList.add('verified');
            }
        }

        window.addEventListener('mousemove', verifyHuman, { once: true });
        window.addEventListener('touchstart', verifyHuman, { once: true });

        function checkAccess() {
            if (!isHuman) {
                alert("ACCESS DENIED: Human input required.");
            } else {
                document.getElementById('main-content').classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "signup.html";
                }, 600);
            }
        }
    </script>
</body>
</html>
