<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrast | Join the Motion</title>
    <style>
        :root { 
            --primary: #00f2ff; 
            --danger: #ff4b2b;
            --warning: #ffd700;
            --success: #00ff88;
            --bg: #050505; 
        }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .input-group { position: relative; margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Password Strength Bar */
        .strength-meter {
            height: 4px;
            width: 0%;
            background: var(--danger);
            margin-top: -4px;
            border-radius: 0 0 8px 8px;
            transition: 0.4s ease;
            box-shadow: 0 0 10px transparent;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .submit-btn:hover { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-text {
            font-size: 0.7rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Protocol Entry</h2>
        
        <div class="input-group">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="email" placeholder="Email Address">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Secure Password" oninput="analyzePassword(this.value)">
            <div id="meter" class="strength-meter"></div>
            <div id="strength-label" class="status-text" style="color: var(--danger);">Weak</div>
        </div>

        <button class="submit-btn" onclick="navigateToDashboard()">GET STARTED</button>
        
        <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 15px; text-align: center;">FastTrast v3.0 | Secure Session</p>
    </div>

    <script>
        function analyzePassword(password) {
            const meter = document.getElementById('meter');
            const label = document.getElementById('strength-label');
            const passInput = document.getElementById('password');
            
            let strength = 0;
            if (password.length > 5) strength++;
            if (password.length > 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            // Visual feedback logic
            if (strength <= 2) {
                meter.style.width = '33%';
                meter.style.background = 'var(--danger)';
                meter.style.boxShadow = '0 0 10px var(--danger)';
                label.innerText = 'Weak';
                label.style.color = 'var(--danger)';
                passInput.style.borderColor = 'var(--danger)';
            } else if (strength <= 4) {
                meter.style.width = '66%';
                meter.style.background = 'var(--warning)';
                meter.style.boxShadow = '0 0 10px var(--warning)';
                label.innerText = 'Medium';
                label.style.color = 'var(--warning)';
                passInput.style.borderColor = 'var(--warning)';
            } else {
                meter.style.width = '100%';
                meter.style.background = 'var(--success)';
                meter.style.boxShadow = '0 0 10px var(--success)';
                label.innerText = 'Strong';
                label.style.color = 'var(--success)';
                passInput.style.borderColor = 'var(--success)';
            }

            if (password.length === 0) {
                meter.style.width = '0%';
                passInput.style.borderColor = 'rgba(255,255,255,0.1)';
            }
        }

        function navigateToDashboard() {
            // Add a quick "success" flash before moving
            document.querySelector('.signup-card').style.opacity = '0';
            document.querySelector('.signup-card').style.transform = 'scale(0.9)';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 400);
        }
    </script>
</body>
</html>
