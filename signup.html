<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrast | Join the Motion</title>
    <style>
        :root { --primary: #00f2ff; --bg: #050505; }
        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Create Account</h2>
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button class="submit-btn">GET STARTED</button>
        <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 15px; text-align: center;">By joining, you agree to the FastTrast Protocol.</p>
    </div>
</body>
</html>
